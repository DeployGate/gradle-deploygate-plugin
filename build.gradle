import org.gradle.api.internal.classpath.ModuleRegistry

import java.util.regex.Pattern

buildscript {
    repositories {
        maven { url "https://plugins.gradle.org/m2/" }
        mavenCentral()
    }
    dependencies {
        classpath "com.diffplug.spotless:spotless-plugin-gradle:8.6.0"
        // Publishes the plugin to the Gradle Plugin Portal. It transitively applies
        // java-gradle-plugin (and maven-publish), which generates the plugin marker
        // and the `com.deploygate` descriptor used by the plugins {} DSL.
        classpath "com.gradle.publish:plugin-publish-plugin:2.1.1"
    }
}

class VersionString implements Comparable<VersionString> {
    static VersionString parse(String value) {
        def parts = value.split("-", 2)

        def versions = parts[0].split("\\.")

        int major = Integer.parseInt(versions[0])
        int minor = Integer.parseInt(versions[1])
        int patch = versions.length > 2 ? Integer.parseInt(versions[2]) : 0
        String channel = null
        String channelVersion = null

        if (parts.length > 1) {
            def pattern = Pattern.compile("([a-zA-Z]+)(\\d+)");
            def m = pattern.matcher(parts[1])

            if (m.matches()) {
                channel = m.group(1)
                channelVersion = m.group(2)
            }
        }

        return new VersionString(major, minor, patch, channel, channelVersion)
    }

    private final int major
    private final int minor
    private final int patch
    private final String channel
    private final String channelVersion

    VersionString(int major, int minor, int patch, String channel, String channelVersion) {
        this.major = major
        this.minor = minor
        this.patch = patch
        this.channel = channel
        this.channelVersion = channelVersion
    }

    @Override
    int compareTo(VersionString o) {
        return versionInt() <=> o.versionInt()
    }

    int versionInt() {
        def base = 100 * 100 * 100 * major + 100 * 100 * minor + 100 * patch // padding is 1-99

        // 3.0.0 vs 3.0.0-alpha10 -> 3.0.0 is greater
        switch (channel) {
            case "alpha":
                base -= 33
            case "beta":
                base -= 33
            case "rc":
                base -= 34
                base += Integer.parseInt(channelVersion)
                break
        }

        return base
    }

    @Override
    String toString() {
        if (channel) {
            return "${major}.${minor}.${patch}-${channel}${channelVersion}"
        } else {
            return "${major}.${minor}.${patch}"
        }
    }
}

apply plugin: 'groovy'
apply plugin: 'maven-publish'
apply plugin: 'signing'
// Registers the `com.deploygate` plugin id on the Gradle Plugin Portal. This also
// applies java-gradle-plugin, so the published jar carries a generated
// `com.deploygate.properties` descriptor alongside the hand-written legacy
// `deploygate.properties`, keeping both `apply plugin: 'deploygate'` and the new id working.
apply plugin: 'com.gradle.plugin-publish'
// Spotless 8.x requires Gradle 8.1+. The acceptance matrix runs this build on Gradle 8.0
// (AGP 8.0's minimum) as well, where Spotless must not be applied.
if (VersionString.parse(gradle.gradleVersion) >= VersionString.parse("8.1")) {
    apply plugin: "com.diffplug.spotless"
}

group = 'com.deploygate'
version = new File(rootProject.projectDir, 'src/main/resources/VERSION').text.trim()

def archivesBaseName = 'gradle'

repositories {
    google()
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

ext {
    releaseVersion = version
    // Be careful to set androidGradleVersion's default. Bytecode compatibility needs to drop backward compatibility.
    androidGradleVersion = VersionString.parse(System.getenv("TEST_AGP_VERSION") ?: "8.0.0")
    gradleVersion = VersionString.parse(gradle.gradleVersion)

    // Gradle 9.0+ bundles Groovy 4, which needs the matching Spock variant.
    requireGroovy4 = VersionString.parse("9.0") <= gradleVersion
}

sourceSets {
    unrollAcceptanceTest {
        groovy.srcDirs += ["src/test/unrollAcceptance"]
        resources.srcDirs += test.resources.srcDirs
    }
    pluginAcceptanceTest {
        groovy.srcDirs += ["src/test/acceptance"]
        resources.srcDirs += test.resources.srcDirs
    }
}

configurations {
    unrollAcceptanceTestCompileOnly.extendsFrom testCompileOnly
    unrollAcceptanceTestRuntime.extendsFrom testRuntime
    unrollAcceptanceTestRuntimeOnly.extendsFrom testRuntimeOnly
    unrollAcceptanceTestImplementation.extendsFrom testImplementation
    unrollAcceptanceTestApi.extendsFrom testApi

    pluginAcceptanceTestCompileOnly.extendsFrom testCompileOnly
    pluginAcceptanceTestRuntime.extendsFrom testRuntime
    pluginAcceptanceTestRuntimeOnly.extendsFrom testRuntimeOnly
    pluginAcceptanceTestImplementation.extendsFrom testImplementation
    pluginAcceptanceTestApi.extendsFrom testApi
}

// For testing. The classpaths of this plugin must be specified

task createClasspathManifest {
    def outputDir = file("$buildDir/$name")

    inputs.files sourceSets.main.runtimeClasspath
    outputs.dir outputDir

    doLast {
        outputDir.mkdirs()
        file("$outputDir/plugin-classpath.txt").text = sourceSets.main.runtimeClasspath.join("\n")
    }
}

// Gradle 9 removed the project-level sourceCompatibility/targetCompatibility convention,
// so these must be configured on the `java` extension.
java {
    // The minimum supported AGP is 8.0, which requires JDK 17, so target Java 17 directly.
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

dependencies {
    compileOnly gradleApi()
    compileOnly localGroovy()
    // Don't enable this on the repository because this artifact may include bytecode incompatibility.
    //    compileOnly "com.android.tools.build:gradle:$androidGradleVersion"
    implementation 'org.jetbrains:annotations:26.1.0'
    implementation 'com.google.guava:guava-annotations:r03'

    implementation 'org.apache.httpcomponents.client5:httpclient5:5.6.1'
    implementation 'com.google.code.gson:gson:2.14.0'
    implementation 'javax.annotation:javax.annotation-api:1.3.2' // for jdk 11 or over

    testImplementation gradleTestKit()
    // Gradle 9 no longer puts the JUnit Platform launcher on the test runtime classpath automatically.
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'junit:junit:4.13.2'

    testImplementation 'org.objenesis:objenesis:3.5'
    testImplementation 'net.bytebuddy:byte-buddy:1.18.10'

    if (requireGroovy4) {
        testImplementation 'org.spockframework:spock-core:2.3-groovy-4.0'
        testImplementation 'org.spockframework:spock-junit4:2.3-groovy-4.0'
    } else {
        testImplementation 'org.spockframework:spock-core:2.3-groovy-3.0'
        testImplementation 'org.spockframework:spock-junit4:2.3-groovy-3.0'
    }

    // for ApplyPluginSpec
    testRuntimeOnly "com.android.tools.build:gradle:$androidGradleVersion"
    testRuntimeOnly files(createClasspathManifest)

    // https://github.com/gradle/gradle/issues/16774#issuecomment-853407822
    // This workaround is only needed before Gradle 7.5, and the internal API it relies on
    // (ModuleRegistry#getModule(...).classpath) was removed in Gradle 9.
    if (gradleVersion < VersionString.parse("7.5")) {
        testRuntimeOnly(files(services.get(ModuleRegistry).getModule("gradle-tooling-api-builders").classpath.asFiles.first()))
    }
}

tasks.create("testUnrollAcceptanceTest", Test) {
    testClassesDirs = sourceSets.unrollAcceptanceTest.output.classesDirs
    classpath = sourceSets.unrollAcceptanceTest.runtimeClasspath
    dependsOn("createClasspathManifest")
}

tasks.create("testPluginAcceptanceTest", Test) {
    testClassesDirs = sourceSets.pluginAcceptanceTest.output.classesDirs
    classpath = sourceSets.pluginAcceptanceTest.runtimeClasspath
    dependsOn("createClasspathManifest")
}

project.tasks.withType(Test).configureEach {
    useJUnitPlatform()

    // ProjectBuilder (used by unit specs) injects synthetic classes via reflection into java.base,
    // which the JDK module system blocks unless these packages are opened to the test worker JVM.
    jvmArgs(
            "--add-opens=java.base/java.lang=ALL-UNNAMED",
            "--add-opens=java.base/java.util=ALL-UNNAMED",
            )

    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat "full"
    }

    environment([
        "ANDROID_HOME": System.getenv("ANDROID_HOME"),
        "TEST_AGP_VERSION": System.getenv("TEST_AGP_VERSION"),
        "TEST_GRADLE_VERSION": System.getenv("TEST_GRADLE_VERSION"),
        "TEST_SERVER_URL": System.getenv("TEST_SERVER_URL") ?: "http://localhost:3000",
    ])
}

task javadocJar(type: Jar, dependsOn: groovydoc) {
    archiveClassifier.set('javadoc')
    from "${buildDir}/javadoc"
}

task sourcesJar(type: Jar) {
    archiveClassifier.set('sources')
    from sourceSets.main.allSource
}

def getRepositoryUsername() {
    return hasProperty('nexusUsername') ? nexusUsername : ""
}

def getRepositoryPassword() {
    return hasProperty('nexusPassword') ? nexusPassword : ""
}

def isRelease() {
    return rootProject.ext.releaseVersion =~ /^\d+\.\d+\.\d+$/
}

allprojects {
    // Spotless requires Java 17 and Gradle 8.1+; skip it where unavailable (e.g. the Gradle 8.0 acceptance matrix).
    if (VersionString.parse(gradle.gradleVersion) >= VersionString.parse("8.1")) {
        spotless {
            ratchetFrom 'origin/master'

            encoding 'UTF-8'

            java {
                importOrder()
                removeUnusedImports()
                googleJavaFormat('1.16.0').aosp().reflowLongStrings()
                formatAnnotations()
                leadingTabsToSpaces(4)
            }
            groovy {
                importOrder()
                excludeJava()
                greclipse('4.26')
                leadingTabsToSpaces(4)
            }
            groovyGradle {
                target '*.gradle'
                greclipse('4.26')
                leadingTabsToSpaces(4)
            }
            format 'misc', {
                target '*.md', '.gitignore', '*.properties'

                trimTrailingWhitespace()
                leadingTabsToSpaces(4)
                endWithNewline()
            }

            // TODO detect violations automatically
            // DO: Use org.jetbrains.annotations.{NotNull,Nullable,VisibleForTesting}
            // DON'T: Use javax.annotations.{Nonnull,Nullable}, Guavas VisibleForTesting
        }
    }
}

// Gradle Plugin Portal metadata. Only the namespaced `com.deploygate` id is registered
// here; the legacy bare `deploygate` id keeps working via the hand-written descriptor
// shipped to Maven Central (the Portal requires a reverse-DNS namespace).
gradlePlugin {
    website = 'https://github.com/DeployGate/gradle-deploygate-plugin'
    vcsUrl = 'https://github.com/DeployGate/gradle-deploygate-plugin'
    plugins {
        deploygate {
            id = 'com.deploygate'
            implementationClass = 'com.deploygate.gradle.plugins.DeployGatePlugin'
            displayName = 'Gradle DeployGate Plugin'
            description = 'Build and deploy your apps to DeployGate by running a single Gradle task.'
            tags.set([
                'deploygate',
                'android',
                'deployment',
                'distribution'
            ])
        }
    }
}

afterEvaluate {
    publishing {
        repositories {
            maven {
                // The legacy Sonatype OSSRH was sunset on 2025-06-30. Publish through the
                // Central Portal's OSSRH Staging API compatibility endpoint instead; a
                // finalization POST in release.sh then transfers the deployment to Maven Central.
                url = isRelease() ? "https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/" : "https://central.sonatype.com/repository/maven-snapshots/"

                credentials(PasswordCredentials) {
                    username = getRepositoryUsername()
                    password = getRepositoryPassword()
                }
            }
        }

        publications {
            // java-gradle-plugin (via plugin-publish) already creates the `pluginMaven` publication
            // from components.java, with the sources and javadoc jars attached. Reuse it for BOTH
            // Maven Central and the Plugin Portal rather than maintaining a second hand-rolled
            // publication: a single publication means a single set of artifacts and a single signing
            // task, which avoids two Sign tasks writing the same `*.asc` files. Keep the Maven Central
            // coordinate as `com.deploygate:gradle` (not the project name) for back-compat.
            pluginMaven {
                artifactId = archivesBaseName
                pom {
                    name = "Gradle DeployGate Plugin"
                    description = "This is the DeployGate plugin for the Gradle. You can build and deploy your apps to DeployGate by running a single task."
                    url = 'https://github.com/DeployGate/gradle-deploygate-plugin'
                    licenses {
                        license {
                            name =  "The Apache Software License, Version 2.0"
                            url = "http://www.apache.org/licenses/LICENSE-2.0.txt"
                            distribution = "repo"
                        }
                    }
                    developers {
                        developer {
                            id = "deploygate"
                            name = "DeployGate"
                        }
                    }
                    scm { url = 'https://github.com/DeployGate/gradle-deploygate-plugin' }
                }
            }
        }

        signing {
            // Match by task name rather than gradle.taskGraph.hasTask("<name>"): hasTask compares the
            // full task path (e.g. ":publishPluginMavenPublicationToMavenRepository"), so the bare name
            // never matched and signing was effectively never "required". Matching the name makes the
            // gate fail fast when a release runs without a signing key.
            required {
                (isRelease() || System.getenv("RELEASE_SCRIPT_TEST") == "true") && gradle.taskGraph.allTasks.any {
                    it.name == "publishPluginMavenPublicationToMavenRepository"
                }
            }

            def signingKey = findProperty("signingKey")
            def signingPassword = findProperty("signingPassword")
            useInMemoryPgpKeys(signingKey, signingPassword)
            // No explicit `sign` call: the plugin-publish plugin already signs the `pluginMaven` and
            // marker publications once the signing plugin is applied. Adding our own `sign` here would
            // double-sign the shared jars and produce conflicting `*.asc` outputs.
        }
    }
}

project.afterEvaluate {
    def process = "git rev-parse HEAD".execute([], rootDir)
    def version_name

    if (process.waitFor() == 0) {
        version_name = process.text.trim()
    } else {
        version_name = "unavailable"
    }

    if (System.getenv("CI") != "true") {
        version_name += "(local)"
    }

    def file = rootProject.file("src/main/resources/VERSION_NAME")

    if (file.exists()) {
        if (file.text.trim() != version_name) {
            file.write(version_name, "UTF-8")
        }
    } else {
        file.write(version_name, "UTF-8")
    }
}