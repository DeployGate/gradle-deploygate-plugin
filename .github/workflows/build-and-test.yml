name: Build and run tests

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master # for ratchet
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java
        with:
          java-version: 17
      - run: ./gradlew spotlessApply
      - uses: reviewdog/action-suggester@v1
        with:
          tool_name: spotless

  unit-test:
    runs-on: ubuntu-22.04
    services:
      app:
        image: ghcr.io/deploygate/deploygate-mock-server:main
        ports:
          - 3000/tcp
        options: >-
          --health-cmd "curl -fI http://localhost:3000"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java
        with:
          java-version: 17
      - run: ./gradlew publishToMavenLocal test
        env:
          TEST_SERVER_URL: http://localhost:${{ job.services.app.ports[3000] }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-reports
          path: build/reports/tests/test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: build/test-results/tests/test

  acceptance-test:
    runs-on: ubuntu-22.04
    services:
      app:
        image: ghcr.io/deploygate/deploygate-mock-server:main
        ports:
          - 3000/tcp
        options: >-
          --health-cmd "curl -fI http://localhost:3000"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 20s
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java
        with:
          java-version: 17
      - run: ./gradlew testUnrollAcceptanceTest
        env:
          TEST_SERVER_URL: http://localhost:3000
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: acceptance-test-reports
          path: build/reports/tests/testUnrollAcceptanceTest
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: build/test-results/tests/testUnrollAcceptanceTest

  acceptance-test-runtime-env:
    runs-on: ubuntu-22.04
    services:
      app:
        image: ghcr.io/deploygate/deploygate-mock-server:main
        ports:
          - 3000/tcp
        options: >-
          --health-cmd "curl -fI http://localhost:3000"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 20s
    strategy:
      fail-fast: false
      # The plugin only touches the stable public Variant/Artifacts API
      # (com.android.build.api.*), whose signatures are identical across AGP
      # 8.0.0..9.2.0, so testing every minor adds no coverage. Test only the
      # boundaries where behavior can actually change:
      #   - the minimum supported AGP/Gradle pair
      #   - the last 8.x with the newest Gradle 8
      #   - the 8.x -> 9.x major boundary (Gradle 9 / Groovy 4 / built-in Kotlin)
      #   - the latest pair, to catch regressions in new releases early
      matrix:
        agp_version:
          - '8.0.0'
          - '8.13.0'
          - '9.0.0'
          - '9.2.0'
        include:
          - agp_version: '8.0.0'
            gradle_version: '8.0'
            java_version: '17'
          - agp_version: '8.13.0'
            gradle_version: '8.13'
            java_version: '17'
          - agp_version: '9.0.0'
            gradle_version: '9.1.0'
            java_version: '17'
          - agp_version: '9.2.0'
            gradle_version: '9.4.1'
            java_version: '17'

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-java
        with:
          java-version: ${{ matrix.java_version }}
      - uses: gradle/gradle-build-action@v3
        with:
          gradle-version: ${{ matrix.gradle_version }}
      - run: gradle testPluginAcceptanceTest
        env:
          TEST_AGP_VERSION: ${{ matrix.agp_version }}
          TEST_GRADLE_VERSION: ${{ matrix.gradle_version }}
          TEST_SERVER_URL: http://localhost:${{ job.services.app.ports[3000] }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-reports-${{ matrix.agp_version }}-with-${{ matrix.gradle_version }}
          path: build/reports/tests/testPluginAcceptanceTest
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.agp_version }}-with-${{ matrix.gradle_version }}
          path: build/test-results/tests/testPluginAcceptanceTest
